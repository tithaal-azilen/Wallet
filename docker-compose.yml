version: '3.8'

services:
  app:
    build: .
    container_name: wallet_app
    ports:
      - "8081:8081"
    environment:
      # Use host.docker.internal to connect to the local postgresql database on Ubuntu
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/springboot_db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
